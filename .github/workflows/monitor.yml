name: Flight Monitor Cron

on:
  schedule:
    - cron: "0 0 * * *" # 매일 자정(UTC) = 한국시간 오전 9시
  workflow_dispatch: # 수동 실행

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger monitor cron
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/monitor"
